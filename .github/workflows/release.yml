name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  # --- Step 1: compute version and create tag (only for workflow_dispatch) ---
  version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version
        id: bump
        run: |
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  # --- Step 2: build binaries ---
  build:
    needs: [version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag || github.ref_name }}

      - name: Set version from tag
        run: |
          TAG="${{ needs.version.outputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo generate-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p librarian-cli

      - name: Build (cargo)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }} -p librarian-cli

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librarian-${{ matrix.target }}.tar.gz librarian
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librarian-${{ matrix.target }}
          path: librarian-${{ matrix.target }}.tar.gz

  # --- Step 3: create GitHub release ---
  release:
    needs: [version, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag || github.ref_name }}
          generate_release_notes: true
          files: librarian-*.tar.gz

  # --- Step 4: open PR to bump version on main ---
  bump-pr:
    needs: [version, release]
    if: github.event_name == 'workflow_dispatch' && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump Cargo.toml and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          BRANCH="chore/bump-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo generate-lockfile

          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $VERSION"
          git push --force origin "$BRANCH"

          # Reuse existing PR if the branch was re-pushed (e.g. after a rerun)
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}"
          else
            gh pr create \
              --title "chore: bump version to $VERSION" \
              --body "Automated version bump after release v$VERSION." \
              --base main \
              --head "$BRANCH"
          fi
